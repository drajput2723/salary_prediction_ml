<!DOCTYPE html>
<html>

<head>

    <title>Salary Prediction System</title>

</head>

<body>

<h1>Salary Prediction System</h1>

<form action="/predict" method="POST">

    <input
        type="number"
        name="age"
        placeholder="Enter Age"
        required>

    <br><br>

    <select name="gender">

        {% for key,value in genders.items() %}

        <option value="{{key}}">{{value}}</option>

        {% endfor %}

    </select>

    <br><br>

    <select name="education">

        {% for key,value in educations.items() %}

        <option value="{{key}}">{{value}}</option>

        {% endfor %}

    </select>

    <br><br>

    <select name="job">

        {% for key,value in jobs.items() %}

        <option value="{{key}}">{{value}}</option>

        {% endfor %}

    </select>

    <br><br>

    <input
        type="number"
        step="0.1"
        name="experience"
        placeholder="Years of Experience"
        required>

    <br><br>

    <button type="submit">

        Predict Salary

    </button>

</form>

<h2>

{{ prediction }}

</h2>

</body>

</html>
